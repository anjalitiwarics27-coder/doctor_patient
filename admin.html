<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
    font-family: Arial;
    background-color:#fff0f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    border:2px solid black;
    padding:30px;
    width:300px;
    text-align:center;
    background:white;
}

input{
    width:90%;
    padding:8px;
    margin:10px 0;
}

button{
    padding:10px 20px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="login-box">
<h2>Admin Login</h2>

<input type="text" placeholder="Admin ID"><br>
<input type="password" placeholder="Password"><br>

<button>Login</button>

</div>

</body>
</html>
