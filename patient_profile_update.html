<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Profile Update</title>

<link rel="stylesheet" href="patient_updateprofile.css">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

</head>
<body>

<!-- 🌙 Dark Mode -->
<div class="dark-toggle" onclick="toggleMode()">🌙</div>

<div class="container">

    <div class="card">

        <!-- Profile Image -->
        <div class="profile-img">
            <img src="https://via.placeholder.com/100" alt="Patient Image">
            <input type="file">
        </div>

        <h2>🧑‍⚕️ Update Patient Profile</h2>

        <form>

            <!-- Row 1 -->
            <div class="row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="text" placeholder="Enter patient ID">
                </div>
            </div>

            <!-- Row 2 -->
            <div class="row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter email">
                </div>
            </div>

            <!-- Row 3 -->
            <div class="row">
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" placeholder="Enter age">
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <select>
                        <option>Select</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>
            </div>

            <!-- Row 4 -->
            <div class="row">
                <div class="form-group">
                    <label>Blood Group</label>
                    <select>
                        <option>Select</option>
                        <option>A+</option>
                        <option>B+</option>
                        <option>O+</option>
                        <option>AB+</option>
                        <option>A-</option>
                        <option>B-</option>
                        <option>O-</option>
                        <option>AB-</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Height (cm)</label>
                    <input type="number" placeholder="Enter height">
                </div>
            </div>

            <!-- Row 5 -->
            <div class="row">
                <div class="form-group">
                    <label>Weight (kg)</label>
                    <input type="number" placeholder="Enter weight">
                </div>

                <div class="form-group">
                    <label>Allergies</label>
                    <input type="text" placeholder="Mention allergies (if any)">
                </div>
            </div>

            <!-- Row 6 -->
            <div class="row">
                <div class="form-group">
                    <label>Chronic Diseases</label>
                    <input type="text" placeholder="Diabetes, BP etc">
                </div>

                <div class="form-group">
                    <label>Emergency Contact</label>
                    <input type="text" placeholder="Emergency phone number">
                </div>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>Address</label>
                <textarea rows="3" placeholder="Enter full address"></textarea>
            </div>

            <!-- Medical History -->
            <div class="form-group">
                <label>Medical History</label>
                <textarea rows="3" placeholder="Past treatments, surgeries"></textarea>
            </div>

            <!-- Confirm -->
            <div class="confirm-box">
                <input type="checkbox" id="confirm">
                <label for="confirm">✔ I confirm the information is correct</label>
            </div>

            <!-- Buttons -->
            <div class="btn-group">
                <button type="reset" class="cancel">Cancel</button>
                <button type="submit">Update Profile</button>
            </div>

        </form>

    </div>

</div>

<!-- 🌙 Script -->
<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
