<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select User Type</title>
  <link rel="stylesheet" href="register_selection_page.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <style>
    h1 {
      margin-bottom: 20px;
      color: #333;
      text-align: center;
    }

    .box {
      width: 350px;
      margin: 100px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .card-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      padding: 20px;
      border-radius: 10px;
      font-size: 18px;
      transition: 0.3s;
    }

    .card a {
      color: white;
      text-decoration: none;
      display: block;
      width: 100%;
      height: 100%;
    }

    .doctor-card {
      background: #4CAF50;
    }

    .patient-card {
      background: #2196F3;
    }

    .card:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>Select User Type</h1>

    <div class="card-container">

      <div class="card doctor-card">
        <a href="doctor_register_page.html">
          🩺 Register as Doctor
        </a>
      </div>

      <div class="card patient-card">
        <a href="patient_newaccount.html">
          👨‍⚕️ Register as Patient
        </a>
      </div>

    </div>
  </div>

</body>
</html>
