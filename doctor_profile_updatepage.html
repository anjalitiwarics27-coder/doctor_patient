<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Profile Update</title>

<!-- CSS -->
<link rel="stylesheet" href="doctor_profile_updatepage.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

</head>
<body>

<!-- 🌙 DARK MODE TOGGLE -->
<div class="dark-toggle" onclick="toggleMode()">🌙</div>

<div class="container">

    <div class="card">

        <!-- PROFILE IMAGE -->
        <div class="profile-img">
            <img src="https://via.placeholder.com/100" alt="Doctor Image">
            <input type="file">
        </div>

        <h2>🩺 Update Doctor Profile</h2>

        <form>

            <!-- ROW 1 -->
            <div class="row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter full name">
                </div>

                <div class="form-group">
                    <label>Doctor ID</label>
                    <input type="text" placeholder="Enter doctor ID">
                </div>
            </div>

            <!-- ROW 2 -->
            <div class="row">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter email">
                </div>
            </div>

            <!-- ROW 3 -->
            <div class="row">
                <div class="form-group">
                    <label>College Name</label>
                    <input type="text" placeholder="Enter college name">
                </div>

                <div class="form-group">
                    <label>School Name</label>
                    <input type="text" placeholder="Enter school name">
                </div>
            </div>

            <!-- ROW 4 -->
            <div class="row">
                <div class="form-group">
                    <label>Specialization</label>
                    <input type="text" placeholder="Cardiologist / Dentist etc">
                </div>

                <div class="form-group">
                    <label>Experience (Years)</label>
                    <input type="number" placeholder="Enter experience">
                </div>
            </div>

            <!-- ROW 5 -->
            <div class="row">
                <div class="form-group">
                    <label>Current Hospital</label>
                    <input type="text" placeholder="Hospital name">
                </div>

                <div class="form-group">
                    <label>Consultation Fee (₹)</label>
                    <input type="number" placeholder="Enter fee">
                </div>
            </div>

            <!-- ROW 6 -->
            <div class="row">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" placeholder="City / Area">
                </div>

                <div class="form-group">
                    <label>Availability</label>
                    <input type="text" placeholder="Mon-Sat, 10AM-5PM">
                </div>
            </div>

            <!-- ABOUT -->
            <div class="form-group">
                <label>About Doctor</label>
                <textarea rows="4" placeholder="Write experience, achievements"></textarea>
            </div>

            <!-- CONFIRM -->
            <div class="confirm-box">
                <input type="checkbox" id="confirm">
                <label for="confirm">✔ I confirm the above information is correct</label>
            </div>

            <!-- BUTTONS -->
            <div class="btn-group">
                <button type="reset" class="cancel">Cancel</button>
                <button type="submit">Update Profile</button>
            </div>

        </form>

    </div>

</div>

<!-- 🌙 DARK MODE SCRIPT -->
<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
