<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Login</title>
  <link rel="stylesheet" href="patient_newaccount.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet"> 
</head>

<body>

  <div class="box">
    <h2>Patient Login / Details 👨‍⚕️</h2>

    <form>

      <input type="text" placeholder="Full Name" required>

      <input type="number" placeholder="Age" required>

      <select required>
        <option value="">Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <input type="text" placeholder="Enter Illness / Problem" required>

      <input type="text" placeholder="City" required>

      <input type="number" placeholder="Budget (₹)" required>

      <input type="tel" placeholder="Contact Number" required>

      <textarea placeholder="Additional Details (optional)" rows="3"></textarea>

      <button class="login-btn">Submit</button>

    </form>
  </div>

</body>
</html>
