      <tbody>
        <tr>
          <td>1</td>
          <td>John Doe</td>
          <td>35</td>

          <td>2026-03-15</td>

        </tr>
        <tr>
          <td>2</td>
          <td>Jane Smith</td>
          <td>28</td>
          <td>Female</td>
          <td>9123456780</td>
          <td>2026-03-17</td>
          <td><button onclick="alert('Viewing Jane Smith')">View Details</button></td>
        </tr>
        <tr>
          <td>3</td>
          <td>Rahul Kumar</td>
          <td>42</td>
          <td>Male</td>
          <td>9988776655</td>
          <td>2026-03-18</td>
          <td><button onclick="alert('Viewing Rahul Kumar')">View Details</button></td>
        </tr>
        <!-- More rows can be added dynamically -->
      </tbody>
    </table>
  </div>
</body>
</html>
